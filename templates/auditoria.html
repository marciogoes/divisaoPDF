<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Auditoria Avançada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#6366f1;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#06b6d4;--gradient:linear-gradient(135deg,#6366f1,#ec4899)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:white}
        .wrap{max-width:1600px;margin:0 auto;padding:24px 20px}
        .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
        .login-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border-radius:24px;padding:50px 40px;border:1px solid rgba(255,255,255,.12);width:100%;max-width:420px;text-align:center}
        .login-icon{width:80px;height:80px;background:var(--gradient);border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:pulse 2s ease-in-out infinite}
        .login-icon i{font-size:36px}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .login-card h1{font-size:1.8rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .login-card p{color:rgba(255,255,255,.5);margin-bottom:30px;font-size:.95rem}
        .login-card input{width:100%;padding:14px 18px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.1);border-radius:12px;color:white;font-size:1rem;font-family:'Inter',sans-serif;margin-bottom:14px;transition:all .3s}
        .login-card input:focus{outline:none;border-color:var(--primary)}
        .login-card input::placeholder{color:rgba(255,255,255,.35)}
        .btn-login{width:100%;padding:14px;background:var(--gradient);border:none;border-radius:12px;color:white;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s}
        .btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(99,102,241,.5)}
        .login-error{color:#f87171;font-size:.85rem;margin-top:10px;display:none}
        .login-error.show{display:block}
        .dash{display:none}
        .dash.show{display:block}
        .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:15px}
        .topbar h1{font-size:1.6rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:10px}
        .topbar-btns{display:flex;gap:8px;flex-wrap:wrap}
        .btn{padding:9px 18px;border:none;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
        .btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:white}
        .btn-outline:hover{background:rgba(255,255,255,.08)}
        .btn-success{background:linear-gradient(135deg,#10b981,#059669);color:white}
        .btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
        .tabs{display:flex;gap:6px;margin-bottom:22px;background:rgba(255,255,255,.05);padding:5px;border-radius:14px;width:fit-content}
        .tab{padding:8px 18px;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:600;color:rgba(255,255,255,.5);transition:all .2s;border:none;background:none}
        .tab.active{background:var(--gradient);color:white}
        .tab-content{display:none}
        .tab-content.show{display:block}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
        .sc{background:rgba(255,255,255,.06);border-radius:16px;padding:18px 20px;border:1px solid rgba(255,255,255,.08)}
        .sc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
        .sc-val{font-size:1.9rem;font-weight:800;line-height:1}
        .sc-lbl{font-size:.72rem;color:rgba(255,255,255,.45);margin-top:5px}
        .charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
        .charts-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:22px}
        .cc{background:rgba(255,255,255,.06);border-radius:16px;padding:18px;border:1px solid rgba(255,255,255,.08)}
        .cc h3{font-size:.88rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.8)}
        .cc h3 i{color:var(--primary)}
        .bar-item{margin-bottom:8px}
        .bar-label{display:flex;justify-content:space-between;font-size:.76rem;color:rgba(255,255,255,.65);margin-bottom:3px}
        .bar-track{background:rgba(255,255,255,.07);border-radius:4px;height:6px;overflow:hidden}
        .bar-fill{height:100%;border-radius:4px}
        .hora-chart{display:flex;align-items:flex-end;gap:3px;height:55px}
        .hora-bar-w{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
        .hora-bar{width:100%;background:rgba(99,102,241,.35);border-radius:2px 2px 0 0;min-height:2px;transition:height .5s;cursor:pointer}
        .hora-bar:hover{background:rgba(99,102,241,.8)}
        .hora-bar:hover::after{content:attr(data-tip);position:absolute;bottom:105%;left:50%;transform:translateX(-50%);background:#1e1b4b;border:1px solid rgba(255,255,255,.15);padding:3px 7px;border-radius:5px;font-size:.65rem;white-space:nowrap;pointer-events:none;z-index:10}
        .hora-labels{display:flex;justify-content:space-between;font-size:.58rem;color:rgba(255,255,255,.3);margin-top:4px}
        .device-grid{display:flex;gap:10px;flex-wrap:wrap}
        .device-item{flex:1;min-width:80px;background:rgba(255,255,255,.05);border-radius:10px;padding:10px;text-align:center}
        .device-icon{font-size:1.5rem;margin-bottom:6px}
        .device-val{font-size:1.1rem;font-weight:700}
        .device-lbl{font-size:.68rem;color:rgba(255,255,255,.45);margin-top:3px}
        .alert-row{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
        .alert-badge{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;font-size:.83rem;font-weight:600}
        .alert-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
        .alert-warning{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:#fcd34d}
        .alert-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
        .tcard{background:rgba(255,255,255,.06);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,.08)}
        .thead2{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
        .thead2 h3{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:7px}
        .thead2 h3 i{color:var(--info)}
        .filters{display:flex;gap:8px;flex-wrap:wrap}
        .sbox{padding:8px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:9px;color:white;font-family:'Inter',sans-serif;font-size:.8rem}
        .sbox::placeholder{color:rgba(255,255,255,.35)}
        .sbox:focus{outline:none;border-color:var(--primary)}
        .sbox option{background:#1e1b4b}
        .tbl-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:1100px}
        th{text-align:left;padding:9px 12px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);border-bottom:1px solid rgba(255,255,255,.07);white-space:nowrap}
        td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.8);vertical-align:middle}
        tr:hover td{background:rgba(255,255,255,.03)}
        .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:.68rem;font-weight:700;white-space:nowrap}
        .bg-green{background:rgba(16,185,129,.2);color:#34d399}
        .bg-blue{background:rgba(99,102,241,.2);color:#818cf8}
        .bg-yellow{background:rgba(245,158,11,.2);color:#fbbf24}
        .bg-red{background:rgba(239,68,68,.2);color:#f87171}
        .bg-gray{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
        .bg-orange{background:rgba(249,115,22,.2);color:#fb923c}
        .bg-purple{background:rgba(139,92,246,.2);color:#c4b5fd}
        .bg-cyan{background:rgba(6,182,212,.2);color:#67e8f9}
        .ip-mono{font-family:monospace;font-size:.77rem;color:#a5b4fc}
        .flag{margin-right:4px}
        .pag{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;flex-wrap:wrap}
        .pb{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:transparent;color:white;cursor:pointer;font-size:.8rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
        .pb:hover,.pb.act{background:var(--primary);border-color:var(--primary)}
        .pb:disabled{opacity:.3;cursor:not-allowed}
        .pinfo{font-size:.78rem;color:rgba(255,255,255,.4)}
        @keyframes spin{to{transform:rotate(360deg)}}
        .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:30px auto}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:rgba(255,255,255,.04)}
        ::-webkit-scrollbar-thumb{background:rgba(99,102,241,.4);border-radius:3px}
        @media(max-width:900px){.charts-grid{grid-template-columns:1fr}.charts-grid-2{grid-template-columns:1fr}}
        @media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
    <div class="login-card">
        <div class="login-icon"><i class="fas fa-shield-alt"></i></div>
        <h1>Auditoria Avançada</h1>
        <p>Monitorização completa de acessos e tecnologia</p>
        <input type="password" id="pwdInput" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn-login" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        <div class="login-error" id="loginError">Senha incorreta.</div>
    </div>
</div>

<div class="wrap dash" id="dashboard">
    <div class="topbar">
        <h1><i class="fas fa-shield-alt" style="background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent"></i> Auditoria Avançada</h1>
        <div class="topbar-btns">
            <button class="btn btn-success" onclick="exportCSV()"><i class="fas fa-download"></i> CSV</button>
            <button class="btn btn-outline" onclick="loadData(currentPage)"><i class="fas fa-sync-alt"></i> Atualizar</button>
            <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('overview')"><i class="fas fa-chart-bar"></i> Overview</button>
        <button class="tab" onclick="showTab('tecnologia')"><i class="fas fa-laptop"></i> Tecnologia</button>
        <button class="tab" onclick="showTab('rede')"><i class="fas fa-network-wired"></i> Rede &amp; Geo</button>
        <button class="tab" onclick="showTab('registos')"><i class="fas fa-list"></i> Registos</button>
    </div>

    <div class="tab-content show" id="tab-overview">
        <div class="stats-grid" id="statsGrid"><div style="text-align:center;padding:30px;grid-column:1/-1"><div class="spinner"></div></div></div>
        <div id="alertRow" class="alert-row"></div>
        <div class="charts-grid" id="chartsOverview"></div>
    </div>

    <div class="tab-content" id="tab-tecnologia">
        <div class="charts-grid" id="chartsTech"></div>
    </div>

    <div class="tab-content" id="tab-rede">
        <div class="charts-grid" id="chartsGeo"></div>
    </div>

    <div class="tab-content" id="tab-registos">
        <div class="tcard">
            <div class="thead2">
                <h3><i class="fas fa-list-alt"></i> Registos de Acesso</h3>
                <div class="filters">
                    <input type="text" class="sbox" id="searchBox" placeholder="🔍 IP, país, browser..." oninput="filterTable()" style="width:200px">
                    <select class="sbox" id="filterDevice" onchange="filterTable()">
                        <option value="">Todos os dispositivos</option>
                        <option value="Desktop">Desktop</option>
                        <option value="Mobile">Mobile</option>
                        <option value="Tablet">Tablet</option>
                        <option value="Bot">Bot</option>
                    </select>
                    <select class="sbox" id="filterBrowser" onchange="filterTable()">
                        <option value="">Todos os browsers</option>
                        <option value="Chrome">Chrome</option>
                        <option value="Firefox">Firefox</option>
                        <option value="Safari">Safari</option>
                        <option value="Edge">Edge</option>
                        <option value="Opera">Opera</option>
                    </select>
                    <select class="sbox" id="filterProxy" onchange="filterTable()">
                        <option value="">Todos</option>
                        <option value="1">Proxy/VPN</option>
                        <option value="0">Direto</option>
                    </select>
                </div>
            </div>
            <div class="tbl-wrap">
                <table id="aTable">
                    <thead>
                        <tr>
                            <th>#</th><th>Data/Hora UTC</th><th>IP</th><th>Localização</th>
                            <th>ISP / Org</th><th>Rede</th><th>Browser</th><th>SO</th>
                            <th>Dispositivo</th><th>Ecrã</th><th>Idioma</th><th>Timezone</th>
                            <th>Operação</th><th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="14" style="text-align:center;padding:30px"><div class="spinner"></div></td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pag" id="pagination"></div>
        </div>
    </div>
</div>

<script>
let pwd = '', currentPage = 1, allRows = [], statsData = {};

function _esc(s) {
    return String(s == null ? '—' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function doLogin() {
    const p = document.getElementById('pwdInput').value;
    if (!p) return;
    fetch(`/auditoria/dados?page=1`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pwd:p})})
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(d => {
            pwd = p;
            document.getElementById('loginWrap').style.display = 'none';
            document.getElementById('dashboard').classList.add('show');
            statsData = d.stats;
            renderStats(d.stats);
            renderOverviewCharts(d.stats);
            renderTechCharts(d.stats);
            renderGeoCharts(d.stats);
            renderTable(d.rows);
            renderPagination(d.page, d.pages, d.total);
            allRows = d.rows;
        })
        .catch(() => document.getElementById('loginError').classList.add('show'));
}

function logout() {
    pwd = ''; currentPage = 1;
    document.getElementById('dashboard').classList.remove('show');
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('pwdInput').value = '';
    document.getElementById('loginError').classList.remove('show');
}

function loadData(page) {
    currentPage = page;
    fetch(`/auditoria/dados?page=${page}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pwd})})
        .then(r => r.json())
        .then(d => {
            statsData = d.stats;
            renderStats(d.stats);
            renderOverviewCharts(d.stats);
            renderTechCharts(d.stats);
            renderGeoCharts(d.stats);
            renderTable(d.rows);
            renderPagination(d.page, d.pages, d.total);
            allRows = d.rows;
        });
}

function showTab(t) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${t}`).classList.add('show');
    event.currentTarget.classList.add('active');
}

function renderStats(s) {
    const cards = [
        { icon:'fas fa-users', bg:'rgba(99,102,241,.2)', ic:'#818cf8', val:s.total, lbl:'Total Acessos' },
        { icon:'fas fa-calendar-day', bg:'rgba(16,185,129,.2)', ic:'#34d399', val:s.hoje, lbl:'Hoje (UTC)' },
        { icon:'fas fa-globe', bg:'rgba(245,158,11,.2)', ic:'#fbbf24', val:s.paises.length, lbl:'Países' },
        { icon:'fas fa-tools', bg:'rgba(236,72,153,.2)', ic:'#f472b6', val:s.ops.reduce((a,o)=>a+o.qtd,0), lbl:'Operações' },
        { icon:'fas fa-robot', bg:'rgba(239,68,68,.2)', ic:'#f87171', val:s.bots||0, lbl:'Bots' },
        { icon:'fas fa-user-secret', bg:'rgba(249,115,22,.2)', ic:'#fb923c', val:s.proxies||0, lbl:'Proxy/VPN' },
        { icon:'fas fa-mobile-alt', bg:'rgba(139,92,246,.2)', ic:'#c4b5fd', val:(s.devices||[]).find(d=>d.device_type==='Mobile')?.qtd||0, lbl:'Mobile' },
        { icon:'fas fa-desktop', bg:'rgba(6,182,212,.2)', ic:'#67e8f9', val:(s.devices||[]).find(d=>d.device_type==='Desktop')?.qtd||0, lbl:'Desktop' },
    ];
    document.getElementById('statsGrid').innerHTML = cards.map(c => `
        <div class="sc">
            <div class="sc-icon" style="background:${c.bg}"><i class="${c.icon}" style="color:${c.ic}"></i></div>
            <div class="sc-val" style="color:${c.ic}">${c.val}</div>
            <div class="sc-lbl">${c.lbl}</div>
        </div>`).join('');
    const alerts = [];
    if (s.bots > 0) alerts.push(`<div class="alert-badge alert-warning"><i class="fas fa-robot"></i> ${s.bots} acesso(s) de bot detectado(s)</div>`);
    if (s.proxies > 0) alerts.push(`<div class="alert-badge alert-danger"><i class="fas fa-user-secret"></i> ${s.proxies} acesso(s) via Proxy/VPN</div>`);
    if (s.proxies === 0 && s.bots === 0) alerts.push(`<div class="alert-badge alert-ok"><i class="fas fa-check-circle"></i> Sem atividade suspeita detectada</div>`);
    document.getElementById('alertRow').innerHTML = alerts.join('');
}

function renderOverviewCharts(s) {
    const maxO = s.ops[0]?.qtd || 1;
    const opLabels = {
        upload:'Upload', dividir_partes:'Dividir Partes', dividir_paginas:'Pág/Parte',
        extrair_paginas:'Extrair Págs', extrair_intervalo:'Extrair Intervalo',
        mesclar:'Mesclar', comprimir:'Comprimir', proteger:'Proteger',
        remover_senha:'Rem. Senha', rotacionar:'Rotacionar',
        remover_paginas:'Rem. Págs', reordenar:'Reordenar',
        marca_dagua:"Mark D'água", numeracao_paginas:'Numeração',
        editar_metadados:'Metadados', assinatura:'Assinatura',
        carimbo:'Carimbo', ocr:'OCR', redimensionar:'Redimensionar',
        qrcode:'QR Code', ajustar_brilho:'Brilho', comparar:'Comparar',
        imagens_para_pdf:'Img→PDF', recortar_margens:'Recortar',
        extrair_texto:'Extr. Texto', extrair_formulario:'Formulário',
        converter_imagens:'Conv. Imagens', dividir_marcadores:'Por Marcadores'
    };
    const maxH = Math.max(...s.por_hora.map(h=>h.qtd), 1);
    const hMap = {}; s.por_hora.forEach(h => hMap[h.hora]=h.qtd);
    const bars = Array.from({length:24},(_,i)=>{
        const h=String(i).padStart(2,'0'), q=hMap[h]||0, pct=Math.max(3,q/maxH*100);
        return `<div class="hora-bar-w"><div class="hora-bar" style="height:${pct}%" data-tip="${h}h: ${q}"></div></div>`;
    }).join('');
    document.getElementById('chartsOverview').innerHTML = `
        <div class="cc">
            <h3><i class="fas fa-tools"></i> Top Operações</h3>
            ${s.ops.slice(0,8).map(o=>`
            <div class="bar-item">
                <div class="bar-label"><span>${opLabels[o.operacao]||o.operacao||'Visita'}</span><span>${o.qtd}</span></div>
                <div class="bar-track"><div class="bar-fill" style="width:${o.qtd/maxO*100}%;background:linear-gradient(90deg,#6366f1,#ec4899)"></div></div>
            </div>`).join('')}
        </div>
        <div class="cc">
            <h3><i class="fas fa-clock"></i> Acessos por Hora (UTC)</h3>
            <div class="hora-chart">${bars}</div>
            <div class="hora-labels"><span>00h</span><span>06h</span><span>12h</span><span>18h</span><span>23h</span></div>
        </div>
        <div class="cc">
            <h3><i class="fas fa-globe-americas"></i> Top Países</h3>
            ${(()=>{const mx=s.paises[0]?.qtd||1;return s.paises.slice(0,8).map(p=>`
            <div class="bar-item">
                <div class="bar-label"><span>${_esc(p.pais)||'Desconhecido'}</span><span>${p.qtd}</span></div>
                <div class="bar-track"><div class="bar-fill" style="width:${p.qtd/mx*100}%;background:linear-gradient(90deg,#10b981,#06b6d4)"></div></div>
            </div>`).join('');})()}
        </div>`;
}

function renderTechCharts(s) {
    const browsers = s.browsers || [], oss = s.os || [], devices = s.devices || [];
    const maxB = browsers[0]?.qtd||1, maxO2 = oss[0]?.qtd||1;
    const browserColors = {Chrome:'#4285f4',Firefox:'#ff7139',Safari:'#006cbe',Edge:'#0078d4',Opera:'#ff1b2d','Internet Explorer':'#0f4c81','Samsung Browser':'#1428a0'};

const browserIcons = {Chrome:'fab fa-chrome',Firefox:'fab fa-firefox',Safari:'fab fa-safari',Edge:'fab fa-edge',Opera:'fab fa-opera'};

function renderTable(rows) {
    const tbody = document.getElementById('tableBody');
    if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="14" style="text-align:center;padding:24px;color:rgba(255,255,255,.3)">Sem registos</td></tr>';
        return;
    }
    tbody.innerHTML = rows.map(r => {
        const loc = [r.cidade, r.pais].filter(Boolean).join(', ') || '—';
        const ispOrg = r.org || r.isp || '—';
        const networkBadges = [];
        if (r.proxy) networkBadges.push('<span class="badge bg-orange"><i class="fas fa-mask"></i> Proxy</span>');
        if (r.hosting) networkBadges.push('<span class="badge bg-yellow"><i class="fas fa-server"></i> Hosting</span>');
        if (r.is_bot) networkBadges.push('<span class="badge bg-red"><i class="fas fa-robot"></i> Bot</span>');
        if (!networkBadges.length) networkBadges.push('<span class="badge bg-green"><i class="fas fa-check"></i> Direto</span>');
        const browserBadge = r.browser ? `<span class="badge bg-blue"><i class="${browserIcons[r.browser]||'fas fa-globe'}"></i> ${_esc(r.browser)} ${(r.browser_version||'').split('.')[0]}</span>` : '—';
        const osBadge = r.os_name ? `<span class="badge bg-gray">${_esc(r.os_name)} ${_esc(r.os_version)||''}</span>` : '—';
        const deviceBadge = r.device_type ? `<span class="badge ${r.device_type==='Bot'?'bg-red':r.device_type==='Mobile'?'bg-green':'bg-gray'}"><i class="${deviceIcons2[r.device_type]||'fas fa-question'}"></i> ${_esc(r.device_type)}</span>` : '—';
        const opBadge = r.operacao ? `<span class="badge ${opBadgeColor[r.operacao]||'bg-gray'}">${opLabels2[r.operacao]||_esc(r.operacao)}</span>` : `<span class="badge bg-gray">Visita</span>`;
        const statusBadge = r.status>=500?`<span class="badge bg-red">${r.status}</span>`:r.status>=400?`<span class="badge bg-yellow">${r.status}</span>`:`<span class="badge bg-green">${r.status||200}</span>`;
        return `<tr data-search="${[r.ip,r.pais,r.cidade,r.browser,r.os_name,r.device_type,r.operacao,r.isp,r.org,r.asn].join(' ').toLowerCase()}" data-device="${r.device_type||''}" data-browser="${r.browser||''}" data-proxy="${r.proxy||0}">
            <td style="color:rgba(255,255,255,.3)">${r.id}</td>
            <td style="white-space:nowrap;font-size:.75rem">${_esc(r.ts)}</td>
            <td class="ip-mono">${_esc(r.ip)||'—'}</td>
            <td style="white-space:nowrap">${_esc(loc)}${r.timezone_geo?`<br><span style="font-size:.68rem;color:rgba(255,255,255,.35)">${_esc(r.timezone_geo)}</span>`:''}</td>
            <td style="font-size:.72rem;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${_esc(ispOrg)}">${_esc(ispOrg)}${r.asn?`<br><span style="color:rgba(255,255,255,.3)">${_esc(r.asn)}</span>`:''}</td>
            <td>${networkBadges.join(' ')}</td>
            <td>${browserBadge}${r.browser_engine?`<br><span style="font-size:.65rem;color:rgba(255,255,255,.3)">${_esc(r.browser_engine)}</span>`:''}</td>
            <td>${osBadge}</td>
            <td>${deviceBadge}${r.screen_res?`<br><span style="font-size:.65rem;color:rgba(255,255,255,.3)">${_esc(r.screen_res)}</span>`:''}</td>
            <td style="font-size:.72rem;white-space:nowrap">${r.viewport||'—'}${r.color_depth?`<br><span style="color:rgba(255,255,255,.3)">${r.color_depth}bit</span>`:''}</td>
            <td style="font-size:.72rem">${r.lang_browser||'—'}${r.touch_support?'<br><span class="badge bg-green" style="font-size:.6rem">👆Touch</span>':''}</td>
            <td style="font-size:.72rem;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${_esc(r.timezone_browser||'')}">${r.timezone_browser||'—'}</td>
            <td>${opBadge}</td>
            <td>${statusBadge}</td>
        </tr>`;
    }).join('');
}

function filterTable() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    const dev = document.getElementById('filterDevice').value;
    const br = document.getElementById('filterBrowser').value.toLowerCase();
    const prx = document.getElementById('filterProxy').value;
    document.querySelectorAll('#tableBody tr').forEach(tr => {
        const s = tr.dataset.search || '';
        const d = tr.dataset.device || '';
        const b = tr.dataset.browser || '';
        const p = tr.dataset.proxy || '';
        const ok = (!q || s.includes(q)) && (!dev || d === dev) && (!br || b.toLowerCase() === br) && (!prx || p === prx);
        tr.style.display = ok ? '' : 'none';
    });
}

function renderPagination(page, pages, total) {
    const p = document.getElementById('pagination');
    if (pages <= 1) { p.innerHTML = `<span class="pinfo">${total} registo(s)</span>`; return; }
    let h = `<button class="pb" onclick="loadData(${page-1})" ${page<=1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
    const s = Math.max(1,page-2), e = Math.min(pages,page+2);
    if (s>1) h += `<button class="pb" onclick="loadData(1)">1</button><span class="pinfo">…</span>`;
    for (let i=s;i<=e;i++) h += `<button class="pb${i===page?' act':''}" onclick="loadData(${i})">${i}</button>`;
    if (e<pages) h += `<span class="pinfo">…</span><button class="pb" onclick="loadData(${pages})">${pages}</button>`;
    h += `<button class="pb" onclick="loadData(${page+1})" ${page>=pages?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
    h += `<span class="pinfo" style="margin-left:6px">${total} registo(s)</span>`;
    p.innerHTML = h;
}

function exportCSV() {
    const form = document.createElement('form');
    form.method = 'POST'; form.action = '/auditoria/export';
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = 'pwd'; inp.value = pwd;
    form.appendChild(inp); document.body.appendChild(form);
    form.submit(); document.body.removeChild(form);
}
